name: Pipeline

# Frontend CI + CD in one workflow: the deploy job gates on lint-typecheck +
# test + e2e + build via `needs:` and runs only on push/dispatch to main.
#
# Kept combined on purpose (vs the overview repo's split terraform.yml +
# deploy.yml): the frontend has real test suites, and a single file lets deploy
# gate on them with `needs:` — no cross-workflow `workflow_run` plumbing. The
# deploy job itself mirrors the overview's deploy.yml (fetch live task def →
# swap image → roll out). Infra lives separately in terraform.yml.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: pipeline-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '22'
  # pnpm version comes from package.json `packageManager` field — single source
  # of truth, also honored by Corepack locally. Don't pass `version:` to
  # pnpm/action-setup or it errors with ERR_PNPM_BAD_PM_VERSION.

  # Deploy-only vars (consumed by the deploy job). Match the Terraform-managed
  # stack in infra/terraform (same names as the overview repo's deploy.yml).
  AWS_REGION: ap-northeast-2
  ECR_REPOSITORY: streamsight-frontend
  ECS_CLUSTER: streamsight
  ECS_SERVICE: streamsight-frontend
  CONTAINER_NAME: streamsight-frontend

permissions:
  id-token: write
  contents: read

jobs:
  lint-typecheck:
    name: Lint & Type check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Type check
        run: pnpm exec tsc --noEmit

  test:
    name: Unit / Integration tests
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      REDIS_HOST: localhost
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ""
      REDIS_KEY_PREFIX: streamsight-bff-ci
      USE_MOCK: '1'
      SESSION_SECRET: ci-test-session-secret-must-be-at-least-32-chars-long
      ALLOWED_ORIGINS: http://localhost:3000

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Vitest with coverage
        run: pnpm test:coverage

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      REDIS_HOST: localhost
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ""
      REDIS_KEY_PREFIX: streamsight-bff-e2e
      USE_MOCK: '1'
      SESSION_SECRET: e2e-session-secret-must-be-at-least-32-chars-long
      ALLOWED_ORIGINS: http://localhost:3000
      ENABLE_DEV_LOGIN: '1'

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          # Browser set is part of the key — adding webkit must invalidate the
          # cache that previously only held chromium.
          key: playwright-chromium-webkit-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install Playwright browser binaries
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        # playwright.config.ts has two projects: chromium + mobile-iphone-x
        # (iPhone X device uses WebKit). Install both engines.
        run: pnpm exec playwright install chromium webkit

      - name: Install Playwright system dependencies
        # Must run unconditionally — browser binaries can be cached (~/.cache/
        # ms-playwright) but the matching apt-get libs (e.g. libwoff2dec) live
        # under /var/lib/apt and reset on every runner. A cache hit on browsers
        # would otherwise skip --with-deps and WebKit fails to launch with
        # "libwoff2dec.so.1.0.2: cannot open shared object file".
        run: pnpm exec playwright install-deps chromium webkit

      - name: Run Playwright tests
        run: pnpm test:e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint-typecheck]

    # Next sets NODE_ENV=production during build, which triggers config.ts
    # superRefine guards: SESSION_SECRET >=32 chars (always), ALLOWED_ORIGINS
    # non-localhost, ENABLE_DEV_LOGIN must not be '1'. We give the build
    # phase prod-safe placeholders so the env-validation pass succeeds —
    # no Redis or backend is actually contacted because routes are dynamic.
    env:
      USE_MOCK: '0'
      SESSION_SECRET: ci-build-secret-must-be-at-least-32-chars-long-xx
      BACKEND_API_URL: https://api.example.com
      REDIS_HOST: localhost
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ""
      ALLOWED_ORIGINS: https://www.example.com
      ENABLE_DEV_LOGIN: '0'

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Next.js
        run: pnpm build

  # ───────────────────────────────────────────────────────────────────────
  # Deploy to ECS Fargate. Same shape as the overview repo's deploy.yml:
  # build+push the image, fetch the LIVE task definition (Terraform owns it —
  # env/secrets/Redis IP), swap in the new image, and roll out. Terraform
  # ignores task_definition on the service, so this isn't reverted.
  # Only on main + after all CI jobs pass. No DB migration (frontend has none).
  # ───────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to ECS
    needs: [lint-typecheck, test, e2e, build]
    runs-on: ubuntu-latest
    if: |
      github.ref == 'refs/heads/main' &&
      (github.event_name == 'push' || github.event_name == 'workflow_dispatch')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & push image
        id: build
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          IMAGE="$REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"
          docker build \
            --build-arg BUILD_GIT_SHA="$IMAGE_TAG" \
            --build-arg BUILD_TIMESTAMP="$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --build-arg BUILD_VERSION="$IMAGE_TAG" \
            -t "$IMAGE" .
          docker push "$IMAGE"
          echo "image=$IMAGE" >> "$GITHUB_OUTPUT"

      - name: Fetch current task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition "$ECS_SERVICE" \
            --query taskDefinition > task-definition.json

      - name: Render new image into task definition
        id: render
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition.json
          container-name: ${{ env.CONTAINER_NAME }}
          image: ${{ steps.build.outputs.image }}

      - name: Deploy to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.render.outputs.task-definition }}
          service: ${{ env.ECS_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true
