name: Pipeline

# Frontend CI + CD merged into a single workflow (same shape as backend's
# pipeline.yml). Deploy job gates on lint-typecheck + test + e2e + build via
# `needs:` and runs only on push/dispatch to main.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: pipeline-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '22'
  # pnpm version comes from package.json `packageManager` field — single source
  # of truth, also honored by Corepack locally. Don't pass `version:` to
  # pnpm/action-setup or it errors with ERR_PNPM_BAD_PM_VERSION.

  # Deploy-only vars (consumed by the deploy job).
  AWS_REGION: ap-southeast-2
  ECR_REPOSITORY: jko_frontend
  ECS_CLUSTER: warmhearted-crocodile-18gqvo-jko-cluster
  ECS_SERVICE: REPLACE_AFTER_FIRST_DEPLOY
  CONTAINER_NAME: jko-frontend
  TASK_DEFINITION: .aws/task-definition.json

permissions:
  id-token: write
  contents: read

jobs:
  lint-typecheck:
    name: Lint & Type check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Type check
        run: pnpm exec tsc --noEmit

  test:
    name: Unit / Integration tests
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      REDIS_URL: redis://localhost:6379/0
      REDIS_KEY_PREFIX: jko-bff-ci
      USE_MOCK: '1'
      SESSION_SECRET: ci-test-session-secret-must-be-at-least-32-chars-long
      ALLOWED_ORIGINS: http://localhost:3000

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Vitest with coverage
        run: pnpm test:coverage

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      REDIS_URL: redis://localhost:6379/0
      REDIS_KEY_PREFIX: jko-bff-e2e
      USE_MOCK: '1'
      SESSION_SECRET: e2e-session-secret-must-be-at-least-32-chars-long
      ALLOWED_ORIGINS: http://localhost:3000
      ENABLE_DEV_LOGIN: '1'

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          # Browser set is part of the key — adding webkit must invalidate the
          # cache that previously only held chromium.
          key: playwright-chromium-webkit-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install Playwright browser binaries
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        # playwright.config.ts has two projects: chromium + mobile-iphone-x
        # (iPhone X device uses WebKit). Install both engines.
        run: pnpm exec playwright install chromium webkit

      - name: Install Playwright system dependencies
        # Must run unconditionally — browser binaries can be cached (~/.cache/
        # ms-playwright) but the matching apt-get libs (e.g. libwoff2dec) live
        # under /var/lib/apt and reset on every runner. A cache hit on browsers
        # would otherwise skip --with-deps and WebKit fails to launch with
        # "libwoff2dec.so.1.0.2: cannot open shared object file".
        run: pnpm exec playwright install-deps chromium webkit

      - name: Run Playwright tests
        run: pnpm test:e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint-typecheck]

    # Next sets NODE_ENV=production during build, which triggers config.ts
    # superRefine guards: SESSION_SECRET >=32 chars (always), ALLOWED_ORIGINS
    # non-localhost, ENABLE_DEV_LOGIN must not be '1'. We give the build
    # phase prod-safe placeholders so the env-validation pass succeeds —
    # no Redis or backend is actually contacted because routes are dynamic.
    env:
      USE_MOCK: '0'
      SESSION_SECRET: ci-build-secret-must-be-at-least-32-chars-long-xx
      BACKEND_API_URL: https://api.example.com
      REDIS_URL: redis://localhost:6379/0
      ALLOWED_ORIGINS: https://www.example.com
      ENABLE_DEV_LOGIN: '0'

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Next.js
        run: pnpm build

  # ───────────────────────────────────────────────────────────────────────
  # Deploy to ECS Fargate (per ADR 008 / 010).
  # Only on main + after all CI jobs pass.
  # PRs skip (event != push), feature branches skip (ref != main).
  # No migration step here — frontend has no DB schema. Just build → push
  # → register → UpdateService.
  # ───────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to ECS
    needs: [lint-typecheck, test, e2e, build]
    runs-on: ubuntu-latest
    if: |
      github.ref == 'refs/heads/main' &&
      (github.event_name == 'push' || github.event_name == 'workflow_dispatch')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & push image
        id: build
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          IMAGE="$REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"
          if aws ecr describe-images \
               --repository-name "$ECR_REPOSITORY" \
               --image-ids "imageTag=$IMAGE_TAG" \
               --region "$AWS_REGION" >/dev/null 2>&1; then
            echo "Image $IMAGE already in ECR, skipping build & push (idempotent re-run)"
          else
            docker build \
              --build-arg BUILD_GIT_SHA="$IMAGE_TAG" \
              --build-arg BUILD_TIMESTAMP="$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
              --build-arg BUILD_VERSION="$IMAGE_TAG" \
              -t "$IMAGE" .
            docker push "$IMAGE"
          fi
          echo "image=$IMAGE" >> "$GITHUB_OUTPUT"

      - name: Substitute task definition placeholders
        env:
          AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
          ALLOWED_ORIGINS: ${{ vars.ALLOWED_ORIGINS }}
        run: |
          sed -i "s|REPLACE_ACCOUNT_ID|${AWS_ACCOUNT_ID}|g" "$TASK_DEFINITION"
          sed -i "s|REPLACE_ALLOWED_ORIGINS|${ALLOWED_ORIGINS}|g" "$TASK_DEFINITION"

      - name: Render task definition (inject image)
        id: render
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: ${{ env.TASK_DEFINITION }}
          container-name: ${{ env.CONTAINER_NAME }}
          image: ${{ steps.build.outputs.image }}

      - name: Register task definition
        id: register
        env:
          RENDERED: ${{ steps.render.outputs.task-definition }}
        run: |
          TASK_DEF_ARN=$(aws ecs register-task-definition \
            --cli-input-json "file://$RENDERED" \
            --query 'taskDefinition.taskDefinitionArn' \
            --output text)
          echo "Registered: $TASK_DEF_ARN"
          echo "arn=$TASK_DEF_ARN" >> "$GITHUB_OUTPUT"

      - name: Update ECS service (rolling deploy)
        env:
          TASK_DEF_ARN: ${{ steps.register.outputs.arn }}
        run: |
          aws ecs update-service \
            --cluster "$ECS_CLUSTER" \
            --service "$ECS_SERVICE" \
            --task-definition "$TASK_DEF_ARN" \
            --force-new-deployment >/dev/null

          echo "::group::Waiting for service to stabilise"
          aws ecs wait services-stable \
            --cluster "$ECS_CLUSTER" \
            --services "$ECS_SERVICE"
          echo "::endgroup::"

          echo "Deployment complete: $TASK_DEF_ARN"
